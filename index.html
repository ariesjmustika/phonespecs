<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneSpecs Project Links</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            color: #18181b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #09090b;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background-color: #fcfcfc;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            text-decoration: none;
            color: #18181b;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .link-card:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .link-card span.desc {
            font-size: 14px;
            color: #71717a;
            font-weight: 400;
            display: block;
            margin-top: 4px;
            text-align: left;
        }
        .link-card div {
            text-align: left;
        }
        .icon {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PhoneSpecs Project Links</h1>
        <div class="links">
            <a href="proposal_aries.html" class="link-card">
                <div>
                    <strong>Project Proposal</strong>
                    <span class="desc">Aries' proposal for the PhoneSpecs project</span>
                </div>
                <svg class="icon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>
            <a href="phonespecs_demo.html" class="link-card">
                <div>
                    <strong>Interactive Demo</strong>
                    <span class="desc">Live demo of the PhoneSpecs application</span>
                </div>
                <svg class="icon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>
            <a href="Proposal_Aries.pdf" class="link-card" target="_blank">
                <div>
                    <strong>Proposal (PDF)</strong>
                    <span class="desc">Downloadable PDF version of the proposal</span>
                </div>
                <svg class="icon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </a>
        </div>
    </div>
</body>
</html>
